<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🏪 Gestor de Productos | Tienda Deportiva</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="container">

    <!-- Header -->
    <header class="header">
      <h1>🏪 Gestor de Productos Deportivos</h1>
      <p class="subtitle">Administra tu tienda deportiva</p>

      <div class="stats-summary">
        <span class="stat">Total: <strong id="stat-total">0</strong></span>
        <span class="stat">Disponibles: <strong id="stat-active">0</strong></span>
        <span class="stat">Agotados: <strong id="stat-inactive">0</strong></span>
      </div>
    </header>

    <!-- Formulario -->
    <section class="form-section">
      <h2 id="form-title">➕ Nuevo Producto</h2>

      <form id="item-form" class="item-form">

        <div class="form-group">
          <label for="item-name">Nombre del producto *</label>
          <input
            type="text"
            id="item-name"
            placeholder="Ej: Camiseta Nike"
            required
          >
        </div>

        <div class="form-group">
          <label for="item-description">Descripción</label>
          <textarea
            id="item-description"
            rows="3"
            placeholder="Detalles del producto"
          ></textarea>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label for="item-category">Categoría</label>
            <select id="item-category">
              <option value="category1">👟 Calzado deportivo</option>
              <option value="category2">🎒 Accesorios deportivos</option>
              <option value="category3" selected>🏃‍♂️ Ropa deportiva</option>
              <option value="category4">🏋️‍♂️ Equipos fitness</option>
              <option value="category5">⚽ Deportes de equipo</option>
            </select>
          </div>

          <div class="form-group">
            <label for="item-priority">Estado comercial</label>
            <select id="item-priority">
              <option value="low">🆕 Nuevo</option>
              <option value="medium" selected>🏷️ Oferta</option>
              <option value="high">🔥 Más vendido</option>
            </select>
          </div>
        </div>

        <div class="form-group">
          <label for="item-size">Talla (opcional)</label>
          <input
            type="text"
            id="item-size"
            placeholder="Ej: M, L, 42"
          >
        </div>

        <div class="form-actions">
          <button type="submit" class="btn btn-primary" id="submit-btn">
            Crear
          </button>
          <button type="button" class="btn btn-secondary" id="cancel-btn" style="display: none;">
            Cancelar
          </button>
        </div>

      </form>
    </section>

    <!-- Filtros -->
    <section class="filters-section">
      <div class="filters">

        <div class="filter-group">
          <label for="filter-status">Disponibilidad:</label>
          <select id="filter-status">
            <option value="all">Todos</option>
            <option value="active">Disponibles</option>
            <option value="inactive">Agotados</option>
          </select>
        </div>

        <div class="filter-group">
          <label for="filter-category">Categoría:</label>
          <select id="filter-category">
            <option value="all">Todas</option>
            <option value="category1">Calzado deportivo</option>
            <option value="category2">Accesorios deportivos</option>
            <option value="category3">Ropa deportiva</option>
            <option value="category4">Equipos fitness</option>
            <option value="category5">Deportes de equipo</option>
          </select>
        </div>

        <div class="filter-group">
          <label for="filter-priority">Estado comercial:</label>
          <select id="filter-priority">
            <option value="all">Todos</option>
            <option value="high">Más vendido</option>
            <option value="medium">Oferta</option>
            <option value="low">Nuevo</option>
          </select>
        </div>

        <div class="filter-group search-group">
          <label for="search-input">Buscar:</label>
          <input
            type="text"
            id="search-input"
            placeholder="Buscar productos..."
          >
        </div>

      </div>
    </section>

    <!-- Lista -->
    <section class="items-section">
      <div class="items-header">
        <h2>🛒 Lista de Productos</h2>
        <button class="btn btn-outline" id="clear-inactive">
          🗑️ Limpiar Agotados
        </button>
      </div>

      <div id="item-list" class="item-list"></div>

      <div id="empty-state" class="empty-state">
        <p>📭 No hay productos que mostrar</p>
        <p class="empty-state-hint">Agrega tu primer producto usando el formulario</p>
      </div>
    </section>

    <!-- Estadísticas -->
    <section class="detailed-stats">
      <h3>📊 Estadísticas por Categoría</h3>
      <div id="stats-details" class="stats-grid"></div>
    </section>

  </div>

  <!-- IMPORTANTE: si tu JS está en starter/script.js déjalo así -->
  <script src="starter/script.js"></script>
</body>
</html>
